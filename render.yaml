services:
  - type: web
    name: o2c-graph-query-app
    runtime: docker
    plan: free
    healthCheckPath: /api/status
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User will set this manually in the Render UI
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true

# This file allows Render to automatically configure your service
# Reference: https://render.com/docs/blueprints
